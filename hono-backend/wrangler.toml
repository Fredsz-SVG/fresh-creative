# Harus sama dengan nama Worker di Cloudflare (Workers & Pages → project ini).
name = "fresh-creative"
main = "worker.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

# Saat `wrangler deploy` tanpa keep_vars: Wrangler menghapus SEMUA plain text vars
# di dashboard lalu hanya mengisi dari wrangler.toml — sehingga env dashboard “hilang”.
# Nilai ini membuat deploy mempertahankan vars yang sudah di-set di dashboard.
keep_vars = true

[dev]
port = 8787
# `npm run dev` memakai --remote (lihat package.json): D1/R2 = resource di dashboard Cloudflare, bukan SQLite lokal.

# Lokal: salin hono-backend/.dev.vars.example ke .dev.vars (Wrangler memuat .dev.vars saat `wrangler dev`).

# Auth: tetap Supabase (login/session). Worker memverifikasi access JWT dengan SUPABASE_JWT_SECRET
# (Dashboard Supabase → Settings → API → JWT Secret). Client kirim Bearer token atau cookie SSR.

# D1 — binding "DB" dipakai di routes (mis. select-area). Migrasi: d1/migrations/
[[d1_databases]]
binding = "DB"
database_name = "fresh-creative"
database_id = "5113454c-f2cb-4010-9fdc-73235535ee98"
migrations_dir = "d1/migrations"
remote = true

# R2 — binding "ASSETS" (bucket sudah dibuat: fresh-creative-assets)
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "fresh-creative-assets"
remote = true

[[durable_objects.bindings]]
name = "REALTIME_HUB"
class_name = "RealtimeHubDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeHubDurableObject"]

# [vars]
# SUPABASE_JWT_SECRET = "isi-dari-supabase-dashboard"
